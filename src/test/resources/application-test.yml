spring:
  datasource:
    url: jdbc:h2:mem:user_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  sql:
    init:
      mode: never

# Evita registrar en Eureka y Zipkin durante los tests
eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

